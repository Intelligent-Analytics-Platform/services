kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: iap
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 9080
        protocol: TCP
      - containerPort: 443
        hostPort: 9443
        protocol: TCP
      - containerPort: 30000
        hostPort: 9000
        protocol: TCP
      - containerPort: 30001
        hostPort: 9001
        protocol: TCP
      - containerPort: 30002
        hostPort: 9002
        protocol: TCP
      - containerPort: 30003
        hostPort: 3000
        protocol: TCP
      - containerPort: 30004
        hostPort: 9004
        protocol: TCP
      - containerPort: 30005
        hostPort: 9005
        protocol: TCP
      - containerPort: 30100
        hostPort: 9100
        protocol: TCP
    extraMounts:
      - hostPath: ./data
        containerPath: /data